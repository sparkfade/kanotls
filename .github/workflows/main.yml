name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: kanotls-linux-64
            cross: true
          - target: i686-unknown-linux-musl
            os: ubuntu-latest
            name: kanotls-linux-32
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: kanotls-linux-arm64-v8a
            cross: true
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            name: kanotls-linux-arm32-v7a
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: kanotls-windows-64.exe
            cross: false
          - target: i686-pc-windows-msvc
            os: windows-latest
            name: kanotls-windows-32.exe
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            name: kanotls-macos-amd64
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: kanotls-macos-arm64
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/kanotls ${{ matrix.name }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/kanotls.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
